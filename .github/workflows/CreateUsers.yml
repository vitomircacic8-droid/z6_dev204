name: CreateUsers

on: [push]

jobs:
  create-users:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install paramiko pyyaml

      - name: Create users on PROD server
        run: |
          python3 - << 'PYEOF'
          import yaml
          import paramiko

          host = "185.2.102.70"
          user = "root"
          password = "03011bfQDZWAPz8g9"

          with open("users.yml", "r") as f:
              data = yaml.safe_load(f)

          users = data.get("list_of_users", [])

          ssh = paramiko.SSHClient()
          ssh.set_missing_host_key_policy(paramiko.AutoAddPolicy())
          ssh.connect(host, username=user, password=password)

          for u in users:
              uname = u['username']
              upass = u['password']
              cmd = f"id -u {uname} &>/dev/null || useradd -m -s /bin/bash {uname} && echo '{uname}:{upass}' | chpasswd"
              stdin, stdout, stderr = ssh.exec_command(cmd)
              stdout.channel.recv_exit_status()
              print(f"User {uname} processed.")

          ssh.close()
          PYEOF