name: CreateUsers

on: [push]

jobs:
  create-users:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass yq

      - name: Create users on PROD server
        env:
          PROD_SRV_PASSWORD: ${{ secrets.PROD_SRV_PASSWORD }}
        run: |
          # Pročitaj broj korisnika iz users.yml
          count=$(yq '.list_of_users | length' users.yml)

          for (( i=0; i<$count; i++ )); do
            username=$(yq ".list_of_users[$i].username" users.yml)
            password=$(yq ".list_of_users[$i].password" users.yml)

            echo "Processing user: $username"

            # Izvršavanje komande na remote serveru preko SSH
            sshpass -p "$PROD_SRV_PASSWORD" ssh -o StrictHostKeyChecking=no root@185.2.102.70 "
              if ! id -u $username >/dev/null 2>&1; then
                useradd -m -s /bin/bash $username
              fi
              echo '$username:$password' | chpasswd
            "
          done