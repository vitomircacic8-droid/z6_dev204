name: CreateUsers

on: [push]

jobs:
  create-users:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass python3-pip
          pip3 install yq

      - name: Create users on PROD server
        env:
          PROD_SRV_PASSWORD: ${{ secrets.PROD_SRV_PASSWORD }}
        run: |
          # Izvlačenje korisnika i lozinki pomoću yq (pip verzija)
          yq -r '.list_of_users[] | "\(.username) \(.password)"' users.yml | while read -r username password; do
            echo "Processing user: $username"

            sshpass -p "$PROD_SRV_PASSWORD" ssh -o StrictHostKeyChecking=no root@185.2.102.70 "
              if ! id -u $username >/dev/null 2>&1; then
                useradd -m -s /bin/bash $username
              fi
              echo '$username:$password' | chpasswd
            "
          done