name: Create Users on PROD

on:
  push:
    branches: [ "**" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible sshpass

      - name: Create users on PROD server
        env:
          PROD_PASSWORD: ${{ secrets.PROD_SRV_PASSWORD }}
        run: |
          ansible-playbook -i "185.2.102.70," playbook.yml \
            --user root \
            --extra-vars "ansible_ssh_pass=${PROD_PASSWORD}" \
            --ssh-extra-args="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            -vvv